services:
  server:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: tugas3-chat-server
    ports:
      - "8088:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_PATH: /app/backend/data/chat.db
    volumes:
      - chat_data:/app/backend/data
    restart: unless-stopped

volumes:
  chat_data: